<!DOCTYPE html>
<html lang="en">
<head>
<title>Using Images</title>
</head>

<body>

<h2>In the Fall</h2>
<p>
<img src="fall.jpg" alt="campus in the fall" style="vertical-align: top;" width="200" height="150"/>
This is a picture of campus in the fall with text at the top of the image.
</p>

<h2>In the Winter</h2>
<p>
<img src="winter.jpg" alt="Gaylord in the winter" style="vertical-align: middle;" width="150" height="200"/>
This is a picture of Gaylord Hall in the winter with the text at the middle of the image.
</p>

<h2>In the Summer</h2>
<p>
<img src="summer.jpg" alt="Gaylord in the summer" style="vertical-align: bottom;" width="150" height="200"/>
This is a picture of Gaylord Hall in the summer with the text at the bottom of the image.
</p>

</body>
</html>
